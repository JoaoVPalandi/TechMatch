<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>

<body>
    <main class="login-container">
        <form action="#" method="POST" class="login-form">
            <h1>Iniciar Sessão</h1>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Ex: usuario@email.com" required>

            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" placeholder="Introduza a sua senha" required>

            <button type="submit">Entrar</button>

            <a href="/cadastro" class="register-link">Ainda não tem conta? Registe-se</a>
        </form>
    </main>


</body>

</html>
